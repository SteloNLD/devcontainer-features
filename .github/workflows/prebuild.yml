name: "Prebuild IaC image"

on:
  push:
    branches:
      - main
    paths:
      - templates/iac-spec/**
      - features/**
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/stelonld/devcontainers/iac
          imageTag: latest
          configFile: templates/iac-spec/.devcontainer/devcontainer.json
          push: always
